<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<head><title>Results - JQuizGen</title></head>
<body>
<div th:fragment="content">
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/teacher/dashboard}" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
        <h2 class="mb-0" th:text="${quiz.title()}"></h2>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Student Results</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(results)}" class="p-4 text-center text-muted">
                No attempts yet for this quiz.
            </div>
            <table th:if="${!#lists.isEmpty(results)}" class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Student</th>
                        <th>Email</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result : ${results}">
                        <td th:text="${result.studentUsername()}"></td>
                        <td th:text="${result.studentEmail()}"></td>
                        <td>
                            <span th:if="${result.score() != null}"
                                  th:text="${result.score() + '%'}"></span>
                            <span th:if="${result.score() == null}" class="text-muted">Pending</span>
                        </td>
                        <td>
                            <span th:if="${result.submittedAt() != null}"
                                  th:text="${#temporals.format(result.submittedAt(), 'MMM d, yyyy HH:mm')}"></span>
                            <span th:if="${result.submittedAt() == null}" class="text-muted">In Progress</span>
                        </td>
                        <td>
                            <span th:switch="${result.status()}">
                                <span th:case="'GRADED'" class="badge bg-success">Graded</span>
                                <span th:case="'SUBMITTED'" class="badge bg-warning text-dark">Submitted</span>
                                <span th:case="'IN_PROGRESS'" class="badge bg-secondary">In Progress</span>
                                <span th:case="*" class="badge bg-light text-dark" th:text="${result.status()}"></span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
